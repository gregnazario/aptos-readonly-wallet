<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payload history — View-Only Wallet</title>
    <link rel="stylesheet" href="./history.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="brand">
        <svg class="eye" viewBox="0 0 48 48" aria-hidden="true">
          <rect width="48" height="48" rx="10" fill="#2563eb" />
          <path
            d="M24 14c-7 0-12.5 5.6-14 10 1.5 4.4 7 10 14 10s12.5-5.6 14-10c-1.5-4.4-7-10-14-10zm0 16a6 6 0 1 1 0-12 6 6 0 0 1 0 12zm0-9a3 3 0 1 0 0 6 3 3 0 0 0 0-6z"
            fill="#fff"
          />
        </svg>
        <div>
          <h1>Payload history</h1>
          <p class="count" id="count">—</p>
        </div>
      </div>
      <div class="toolbar">
        <button id="copy-all" type="button" class="vow-btn">Copy all</button>
        <button id="download-all" type="button" class="vow-btn">Download all</button>
        <button id="clear-all" type="button" class="vow-btn danger">Clear all</button>
      </div>
    </header>
    <main id="list" class="list"></main>
    <script type="module" src="./history.ts"></script>
  </body>
</html>
